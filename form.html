<body>

    <h3>Registration Form</h3>
    <form action="thanks.html">
       Name:- <input type="text" placeholder="type something here"><br><br>
       Password:- <input type="password" placeholder="password"><br><br>
       <h5>select your class</h5>
        <label for="101">
            <input type="radio" value="class XI" name="class" id="101">class XI
        </label><br>
        <label for="102">
            <input type="radio" value="class XII" name="class" id="102">class XII<br>
        </label>
        <br>
    
        <h5>select your subject</h5>
        <label for="math">
            <input type="checkbox" value="math" name="subject" id="101"> Mathematics
        </label><br>
        <label for="phy">
            <input type="checkbox" value="phy" name="subject" id="102"> Physics
        </label><br>
        <label for="Eng">
            <input type="checkbox" value="eng" name="subject" id="103"> English
        </label><br>
        <label for="Chem">
            <input type="checkbox" value="Chem" name="subject" id="104"> Chemisty
        </label><br>
        <label for="comp">
            <input type="checkbox" value="comp" name="subject" id="105"> Computer
        </label><br><br>
        <h5>select your city</h5>
        <select name="city">
            <option value="Delhi"> Delhi</option>
            <option value="Gujarat"> Gujarat</option>
            <option value="Punjab"> Punjab</option>
            <option value="Kerala"> Kerala</option>
            <option value="Mumbai"> Mumbai</option>
        </select><br>
        <br>
        <h5>Feedback</h5>
        <textarea name="feedback" placeholder="please add your valuable feedback" id="101" rows="5" cols="50"></textarea>
